<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Батлов GameBattle59</title>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
        }

        #loading-notice {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
        }

        /* Стили для формы внутри карты */
        .map-form {
            padding: 5px;
            font-size: 14px;
            color: #333;
        }
        .map-form input {
            width: 100%;
            padding: 5px;
            margin: 5px 0 10px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .map-form button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .map-form button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div id="loading-notice">Загрузка Карты Перми...</div>
    <div id="map"></div>

    <script type="text/javascript">
        ymaps.ready(init);

        function init() {
            document.getElementById('loading-notice').style.display = 'none';

            // 1. Координаты центров районов Перми
            const districtCoordinates = {
                'leninskiy': [58.0104, 56.2504],
                'sverdlovskiy': [57.9942, 56.2692],
                'industrialniy': [57.9790, 56.1950],
                'motovilihinskiy': [58.0285, 56.2860],
                'kirovskiy': [58.0140, 56.0250],
                'dzerzhinskiy': [58.0075, 56.1880],
                'ordzhonikidzevskiy': [58.1150, 56.3350]
            };

            const districtNames = {
                'leninskiy': 'Ленинский район 🏛️',
                'sverdlovskiy': 'Свердловский район 🏢',
                'industrialniy': 'Индустриальный район 🏭',
                'motovilihinskiy': 'Мотовилихинский район ⚒️',
                'kirovskiy': 'Кировский район (Закамск) 🌲',
                'dzerzhinskiy': 'Дзержинский район 🚂',
                'ordzhonikidzevskiy': 'Орджоникидзевский район 🌊'
            };

            // 2. Получаем район из ссылки бота
            const urlParams = new URLSearchParams(window.location.search);
            const chosenDistrict = urlParams.get('district');

            let mapCenter = [58.0104, 56.2504]; 
            let defaultZoom = 12;

            if (chosenDistrict && districtCoordinates[chosenDistrict]) {
                mapCenter = districtCoordinates[chosenDistrict];
                defaultZoom = 14;
            }

            // 3. Создаем карту
            var myMap = new ymaps.Map("map", {
                center: mapCenter,
                zoom: defaultZoom,
                controls: ['zoomControl', 'geolocationControl']
            });

            // 4. Ставим золотую звезду в центр выбранного района
            if (chosenDistrict && districtCoordinates[chosenDistrict]) {
                var centerMark = new ymaps.Placemark(mapCenter, {
                    balloonContent: `<b>Вы здесь: ${districtNames[chosenDistrict]}</b><br>Твой базовый район.`
                }, {
                    preset: 'islands#goldStarIcon',
                    iconColor: '#ffcc00'
                });
                myMap.geoObjects.add(centerMark);
            }

            // ==========================================
            // ЛОГИКА ДОБАВЛЕНИЯ ТОЧЕК ИГРОКАМИ
            // ==========================================

            // Слушаем клик по карте
            myMap.events.add('click', function (e) {
                // Получаем координаты клика
                var coords = e.get('coords');

                // Создаем HTML-форму создания батла внутри всплывающего окна (балуна)
                var formHtml = `
                    <div class="map-form">
                        <b>Создать новый батл ⚔️</b><br>
                        <label>Что за игра / событие?</label>
                        <input type="text" id="battle-title" placeholder="Например: Катка в FIFA 25">
                        <button id="save-battle-btn">Создать точку</button>
                    </div>
                `;

                // Открываем балун в месте клика
                myMap.balloon.open(coords, {
                    contentHeader: 'Новая точка сбора',
                    contentBody: formHtml
                });

                // Вешаем обработчик на кнопку "Создать точку" внутри балуна
                // Используем setTimeout, чтобы дождаться, пока HTML появится на экране
                setTimeout(function() {
                    document.getElementById('save-battle-btn').addEventListener('click', function() {
                        var title = document.getElementById('battle-title').value;
                        if (!title) {
                            alert('Пожалуйста, введи название батла!');
                            return;
                        }

                        // Создаем новую метку на карте
                        var playerPlacemark = new ymaps.Placemark(coords, {
                            balloonContent: `<b>Батл от игрока! 🎮</b><br>${title}`
                        }, {
                            preset: 'islands#darkGreenCircleDotIcon' // Игрокские метки будут зелеными кружками
                        });

                        // Добавляем метку на карту и закрываем форму
                        myMap.geoObjects.add(playerPlacemark);
                        myMap.balloon.close();
                    });
                }, 100);
            });
        }
    </script>
</body>
</html>
