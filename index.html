<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта Батлов GameBattle59</title>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            overflow: hidden; /* Запрещаем скролл самой страницы */
        }

        #loading-notice {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
        }

        /* Красивые стили для мобильной формы */
        .map-form {
            padding: 10px 5px;
            font-size: 14px;
            color: #333;
            min-width: 180px;
        }
        .map-form label {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }
        .map-form input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        .map-form button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loading-notice">Загрузка Карты Перми...</div>
    <div id="map"></div>

    <script type="text/javascript">
        ymaps.ready(init);

        function init() {
            document.getElementById('loading-notice').style.display = 'none';

            // 1. Координаты центров районов Перми
            const districtCoordinates = {
                'leninskiy': [58.0104, 56.2504],
                'sverdlovskiy': [57.9942, 56.2692],
                'industrialniy': [57.9790, 56.1950],
                'motovilihinskiy': [58.0285, 56.2860],
                'kirovskiy': [58.0140, 56.0250],
                'dzerzhinskiy': [58.0075, 56.1880],
                'ordzhonikidzevskiy': [58.1150, 56.3350]
            };

            const districtNames = {
                'leninskiy': 'Ленинский район 🏛️',
                'sverdlovskiy': 'Свердловский район 🏢',
                'industrialniy': 'Индустриальный район 🏭',
                'motovilihinskiy': 'Мотовилихинский район ⚒️',
                'kirovskiy': 'Кировский район (Закамск) 🌲',
                'dzerzhinskiy': 'Дзержинский район 🚂',
                'ordzhonikidzevskiy': 'Орджоникидзевский район 🌊'
            };

            // 2. Получаем район из ссылки бота
            const urlParams = new URLSearchParams(window.location.search);
            const chosenDistrict = urlParams.get('district');

            let mapCenter = [58.0104, 56.2504]; 
            let defaultZoom = 12;

            if (chosenDistrict && districtCoordinates[chosenDistrict]) {
                mapCenter = districtCoordinates[chosenDistrict];
                defaultZoom = 14;
            }

            // 3. Создаем карту
            var myMap = new ymaps.Map("map", {
                center: mapCenter,
                zoom: defaultZoom,
                controls: ['zoomControl', 'geolocationControl']
            });

            // 4. Ставим золотую звезду в центр выбранного района
            if (chosenDistrict && districtCoordinates[chosenDistrict]) {
                var centerMark = new ymaps.Placemark(mapCenter, {
                    balloonContent: `<b>Вы здесь: ${districtNames[chosenDistrict]}</b><br>Твой базовый район.`
                }, {
                    preset: 'islands#goldStarIcon',
                    iconColor: '#ffcc00'
                });
                myMap.geoObjects.add(centerMark);
            }

            // ==========================================
            // ФИНАЛЬНАЯ ЛОГИКА КЛИКОВ (ДЛЯ ПК И МОБИЛОК)
            // ==========================================

            // Функция открытия формы
            function openBattleForm(coords) {
                // Пытаемся закрыть старый балун, если он открыт, чтобы не плодить формы
                if (myMap.balloon.isOpen()) {
                    myMap.balloon.close();
                }

                myMap.balloon.open(coords, {
                    contentHeader: 'Новый батл ⚔️',
                    contentBody: `
                        <div class="map-form">
                            <label>Что за катка?</label>
                            <input type="text" id="battle-title" placeholder="FIFA / CS / Настолки">
                            <button id="save-battle-btn">Создать точку</button>
                        </div>
                    `
                });
            }

            // УНИВЕРСАЛЬНЫЙ ОБРАБОТЧИК: слушаем событие 'mousedown' (нажатие кнопки/тап),
            // но только если это одиночный левый клик и карта не тащится.
            // Это событие отлично работает и на ПК, и на смартфонах.
            myMap.events.add('click', function (e) {
                // Если клик был не по самой карте, а по существующей метке — форму не открываем
                if (e.get('target') !== myMap) { return; }
                
                openBattleForm(e.get('coords'));
            });

            // Для телефонов, если 'click' не всегда пробивает, используем дублирующее
            // событие зажатия (длинный тап) — оно более надежно в WebApp
            myMap.events.add('contextmenu', function (e) {
                // Чтобы на ПК не открывалось стандартное меню правой кнопки мыши
                if (e.get('target') === myMap) {
                   e.preventDefault(); 
                   openBattleForm(e.get('coords'));
                }
            });

            // Оживление кнопки создания точки
            myMap.events.add('balloonopen', function () {
                var btn = document.getElementById('save-battle-btn');
                if (btn) {
                    btn.addEventListener('click', function () {
                        var title = document.getElementById('battle-title').value;
                        if (!title.trim()) {
                            alert('Введи название игры!');
                            return;
                        }

                        var currentCoords = myMap.balloon.getPosition();

                        var playerMark = new ymaps.Placemark(currentCoords, {
                            balloonContent: `<b>Игрок собирает батл! 🎮</b><br>${title}`
                        }, {
                            preset: 'islands#darkGreenGameIcon', 
                            iconColor: '#28a745'
                        });

                        myMap.geoObjects.add(playerMark);
                        myMap.balloon.close(); 
                    });
                }
            });
        }
    </script>
</body>
</html>
