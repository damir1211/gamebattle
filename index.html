<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Карта Батлов GameBattle59</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #loading-notice {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
        }

        #bottom-form {
            position: fixed;
            bottom: -200px; 
            left: 0;
            width: 100%;
            background: #ffffff;
            z-index: 9999; 
            box-sizing: border-box;
            padding: 16px 20px 30px 20px;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            transition: bottom 0.3s ease-out; 
        }

        #bottom-form.active {
            bottom: 0; 
        }

        .form-header {
            font-weight: bold;
            font-size: 16px;
            color: #222;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .close-btn {
            color: #888;
            cursor: pointer;
            padding: 0 5px;
        }

        #bottom-form input {
            width: 100%;
            padding: 12px;
            margin: 5px 0 12px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px; 
            background: #f5f5f5;
            color: #000;
        }

        #bottom-form button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loading-notice">Загрузка Карты Перми...</div>
    <div id="map"></div>

    <div id="bottom-form">
        <div class="form-header">
            <span>Создать новый батл ⚔️</span>
            <span class="close-btn" id="close-form-btn">✕</span>
        </div>
        <input type="text" id="battle-title" placeholder="Что за катка? (FIFA, CS, Настолки)" autocomplete="off">
        <button id="save-battle-btn">Создать точку</button>
    </div>

    <script type="text/javascript">
        let tg = null;
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        }

        ymaps.ready(init);

        let activeCoords = null;

        function decodeBase64UTF8(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        function init() {
            document.getElementById('loading-notice').style.display = 'none';

            const districtCoordinates = {
                'leninskiy': [58.0104, 56.2504],
                'sverdlovskiy': [57.9942, 56.2692],
                'industrialniy': [57.9790, 56.1950],
                'motovilihinskiy': [58.0285, 56.2860],
                'kirovskiy': [58.0140, 56.0250],
                'dzerzhinskiy': [58.0075, 56.1880],
                'ordzhonikidzevskiy': [58.1150, 56.3350]
            };

            const urlParams = new URLSearchParams(window.location.search);
            const chosenDistrict = urlParams.get('district') || 'leninskiy'; // По умолчанию Ленинский
            const encodedData = urlParams.get('data');

            let mapCenter = districtCoordinates[chosenDistrict] || [58.0104, 56.2504]; 
            let defaultZoom = chosenDistrict ? 14 : 12;

            var myMap = new ymaps.Map("map", {
                center: mapCenter,
                zoom: defaultZoom,
                controls: ['zoomControl', 'geolocationControl']
            });

            if (chosenDistrict && districtCoordinates[chosenDistrict]) {
                var centerMark = new ymaps.Placemark(mapCenter, {}, {
                    preset: 'islands#goldStarIcon',
                    iconColor: '#ffcc00'
                });
                myMap.geoObjects.add(centerMark);
            }

            // Рендерим точки из базы
            if (encodedData) {
                try {
                    let decryptedJson = decodeBase64UTF8(encodedData);
                    let battles = JSON.parse(decryptedJson);

                    battles.forEach(function(battle) {
                        var battleMark = new ymaps.Placemark([battle.lat, battle.lng], {
                            balloonContent: `<b>🎮 Игра: ${battle.title}</b><br>👤 Организатор: @${battle.username}`
                        }, {
                            preset: 'islands#darkGreenGameIcon',
                            iconColor: '#28a745'
                        });
                        myMap.geoObjects.add(battleMark);
                    });
                } catch (e) {
                    console.error("Ошибка парсинга точек базы данных:", e);
                }
            }

            // Управление формой сбора
            function triggerForm(coords) {
                activeCoords = coords;
                document.getElementById('bottom-form').classList.add('active');
                document.getElementById('battle-title').focus();
            }

            document.getElementById('close-form-btn').addEventListener('click', function() {
                document.getElementById('bottom-form').classList.remove('active');
                document.getElementById('battle-title').blur();
            });

            myMap.events.add('click', function (e) {
                if (e.get('target') === myMap) { triggerForm(e.get('coords')); }
            });

            myMap.events.add('mousedown', function (e) {
                if (e.get('target') !== myMap) { return; }
                var domEvent = e.get('domEvent');
                if (domEvent && domEvent.get('button') === 0) { triggerForm(e.get('coords')); }
            });

            myMap.events.add('contextmenu', function (e) {
                if (e.get('target') === myMap) {
                    e.preventDefault(); 
                    triggerForm(e.get('coords'));
                }
            });

            document.getElementById('save-battle-btn').addEventListener('click', function () {
                var title = document.getElementById('battle-title').value;
                if (!title.trim()) {
                    alert('Введи название игры!');
                    return;
                }
                if (!activeCoords) {
                    alert('Ошибка координат.');
                    return;
                }

                // Передаем координаты, название игры И ТЕКУЩИЙ РАЙОН
                var battleData = {
                    lat: activeCoords[0],
                    lng: activeCoords[1],
                    title: title.trim(),
                    district: chosenDistrict
                };

                if (tg) {
                    tg.sendData(JSON.stringify(battleData));
                } else {
                    alert("Локальный тест:\n" + JSON.stringify(battleData));
                }
            });
        }
    </script>
</body>
</html>
