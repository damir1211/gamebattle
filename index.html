<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Батлов GameBattle59</title>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>

    <style>
        /* Растягиваем карту на весь экран смартфона */
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
        }
        /* Всплывающая подсказка над картой */
        #loading-notice {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading-notice">Загрузка Карты Перми...</div>
    <div id="map"></div>

    <script type="text/javascript">
        // Функция для чтения параметров из ссылки (?district=...)
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Координаты центров всех районов Перми
        const districtCoordinates = {
            'leninskiy': [58.0104, 56.2502],          // Ленинский (Центр)
            'sverdlovskiy': [57.9861, 56.2694],       // Свердловский
            'industrialniy': [57.9642, 56.1953],      // Индустриальный
            'motovilihinskiy': [58.0325, 56.2916],    // Мотовилиха
            'kirovskiy': [58.0125, 56.0124],          // Кировский (Закамск)
            'dzerzhinskiy': [58.0094, 56.1864],       // Дзержинский
            'ordzhonikidzevskiy': [58.1256, 56.3421]  // Орджоникидзевский
        };

        function init() {
            // Скрываем надпись загрузки, когда API готово
            const notice = document.getElementById('loading-notice');
            if (notice) notice.style.display = 'none';

            // Считываем какой район прилетел из бота
            const currentDistrict = getQueryParam('district');
            
            // По умолчанию — общий центр Перми
            let mapCenter = [58.0104, 56.2502]; 
            let mapZoom = 12; // Стандартный масштаб для города

            // Если район передан и есть в нашей базе — меняем центр и делаем зум ближе
            if (currentDistrict && districtCoordinates[currentDistrict]) {
                mapCenter = districtCoordinates[currentDistrict];
                mapZoom = 14; // Приближаем район ближе, чтобы сразу видеть улицы
            }

            // Создаем карту
            var myMap = new ymaps.Map("map", {
                center: mapCenter,
                zoom: mapZoom,
                controls: ['zoomControl', 'geolocationControl']
            });

            // ТЕСТОВЫЙ МАРКЕР (Пример, как ставить точки батлов)
            // В будущем сюда можно выводить точки из базы данных
            var myPlacemark = new ymaps.Placemark(mapCenter, {
                balloonContent: 'Здесь скоро будут турниры GameBattle59!'
            }, {
                preset: 'islands#redDotIconWithCaption'
            });
            
            myMap.geoObjects.add(myPlacemark);
        }

        // Ждем полную загрузку Яндекс.Карт
        ymaps.ready(init);
    </script>
</body>
</html>
