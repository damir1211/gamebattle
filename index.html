<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Батлов GameBattle59</title>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
    
    <style>
        /* Растягиваем карту на весь экран смартфона */
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
        }
        /* Всплывающая подсказка над картой */
        #loading-notice {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading-notice">Загрузка Карты Перми...</div>
    <div id="map"></div>

    <script type="text/javascript">
        // Ждем, пока API Яндекса загрузится
        ymaps.ready(init);

        function init() {
            // Убираем плашку загрузки
            document.getElementById('loading-notice').style.display = 'none';

            // Создаем карту с центром в Перми (координаты примерно Попова/Ленина)
            var myMap = new ymaps.Map("map", {
                center: [58.010455, 56.229443], // Координаты центра Перми
                zoom: 12, // Масштаб (город виден целиком)
                controls: ['zoomControl', 'geolocationControl'] // Оставляем только кнопки зума и локации
            });

            // Тестовые метки игроков (позже будем брать их из базы данных)
            var players = [
                {
                    coords: [58.0075, 56.1956], // Индустриальный район (условно у Столицы)
                    name: "Дамир (Ты)",
                    game: "Варгеймы, Стратегии 🗺️",
                    status: "Ищу оппонента на вечер!"
                },
                {
                    coords: [58.0143, 56.2732], // Мотовилиха (условно у Цирка)
                    name: "Алексей",
                    game: "Америтреш, Немезида 🐉",
                    status: "Есть свободное место за столом"
                },
                {
                    coords: [57.9925, 56.2488], // Свердловский район
                    name: "Мария",
                    game: "Пати-геймы, Кодовые Имена 🎉",
                    status: "Сыграем в кофейне?"
                }
            ];

            // На циклом расставляем метки на карте Перми
            players.forEach(function(player) {
                var placemark = new ymaps.Placemark(player.coords, {
                    // Данные, которые покажутся при клике на метку
                    balloonContentHeader: `<b>${player.name}</b>`,
                    balloonContentBody: `<b>Любит:</b> ${player.game}<br><b>Статус:</b> ${player.status}`,
                    balloonContentFooter: `<button style="width:100%; padding:5px; background:#007bff; color:#fff; border:none; border-radius:4px;" onclick="alert('Запрос отправлен!')">Вызвать на Батл ⚔️</button>`
                }, {
                    preset: 'islands#blueCircleDotIcon' // Стиль метки
                });

                myMap.geoObjects.add(placemark);
            });
        }
    </script>
</body>
</html>
