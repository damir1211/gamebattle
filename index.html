<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Батлов GameBattle59</title>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>

    <style>
        /* Растягиваем карту на весь экран смартфона */
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
        }

        /* Всплывающая подсказка над картой */
        #loading-notice {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading-notice">Загрузка Карты Перми...</div>
    <div id="map"></div>

    <script type="text/javascript">
        // Ждем, пока API Яндекса загрузится
        ymaps.ready(init);

        function init() {
            // Убираем уведомление о загрузке
            document.getElementById('loading-notice').style.display = 'none';

            // 1. Словарь координат центров районов Перми
            const districtCoordinates = {
                'leninskiy': [58.0104, 56.2504],          // Ленинский
                'sverdlovskiy': [57.9942, 56.2692],       // Свердловский
                'industrialniy': [57.9731, 56.1952],      // Индустриальный
                'motovilihinskiy': [58.0305, 56.2912],    // Мотовилиха
                'kirovskiy': [58.0118, 56.0125],          // Кировский (Закамск)
                'dzerzhinskiy': [58.0092, 56.1862],       // Дзержинский
                'ordzhonikidzevskiy': [58.1187, 56.3421]  // Орджо
            };

            // 2. Ловим параметр ?district= из ссылки
            const urlParams = new URLSearchParams(window.location.search);
            const chosenDistrict = urlParams.get('district');

            // 3. Настройки по умолчанию (Центр Перми)
            let mapCenter = [58.0104, 56.2504]; 
            let defaultZoom = 12;

            // 4. Если район передан и есть в словаре — летим туда и приближаем
            if (chosenDistrict && districtCoordinates[chosenDistrict]) {
                mapCenter = districtCoordinates[chosenDistrict];
                defaultZoom = 14; // Масштаб ближе, чтобы рассмотреть район
            }

            // 5. Создаем саму карту
            var myMap = new ymaps.Map("map", {
                center: mapCenter,
                zoom: defaultZoom,
                controls: ['zoomControl', 'geolocationControl'] // Оставляем только нужные кнопки
            });

            // 6. Добавляем примеры точек (каток/батлов) на карту для красоты
            // Точка 1
            var placemark1 = new ymaps.Placemark([58.0104, 56.2504], {
                balloonContent: '<b>Клуб настолок "Ленинский Батл"</b><br>Игры: Вархаммер, Монополия<br>Статус: Идет набор!'
            }, {
                preset: 'islands#redDotIconWithCaption'
            });

            // Точка 2
            var placemark2 = new ymaps.Placemark([58.0305, 56.2912], {
                balloonContent: '<b>Мотовилиха Gaming</b><br>Турнир по Покеру в пятницу!'
            }, {
                preset: 'islands#blueDotIconWithCaption'
            });

            myMap.geoObjects.add(placemark1);
            myMap.geoObjects.add(placemark2);
        }
    </script>
</body>
</html>
