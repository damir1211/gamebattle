<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Батлов GameBattle59</title>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
        }

        #loading-notice {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading-notice">Загрузка Карты Перми...</div>
    <div id="map"></div>

    <script type="text/javascript">
        ymaps.ready(init);

        function init() {
            document.getElementById('loading-notice').style.display = 'none';

            // 1. Точные скорректированные координаты центров районов Перми
            const districtCoordinates = {
                'leninskiy': [58.0104, 56.2504],          // Ленинский (Эспланада / Драмтеатр)
                'sverdlovskiy': [57.9942, 56.2692],       // Свердловский (Комсомольская площадь)
                'industrialniy': [57.9790, 56.1950],      // Индустриальный (ТРК Столица / Мира)
                'motovilihinskiy': [58.0285, 56.2860],    // Мотовилиха (Район Цирка / Рабочий поселок)
                'kirovskiy': [58.0140, 56.0250],          // Кировский (Центр Закамска / Экран)
                'dzerzhinskiy': [58.0075, 56.1880],       // Дзержинский (Хохрякова / Район Гознака)
                'ordzhonikidzevskiy': [58.1150, 56.3350]  // Орджоникидзевский (Гайва / Парк Чехова)
            };

            // Красивые названия для меток центров
            const districtNames = {
                'leninskiy': 'Ленинский район 🏛️',
                'sverdlovskiy': 'Свердловский район 🏢',
                'industrialniy': 'Индустриальный район 🏭',
                'motovilihinskiy': 'Мотовилихинский район ⚒️',
                'kirovskiy': 'Кировский район (Закамск) 🌲',
                'dzerzhinskiy': 'Дзержинский район 🚂',
                'ordzhonikidzevskiy': 'Орджоникидзевский район 🌊'
            };

            // 2. Получаем район из ссылки бота
            const urlParams = new URLSearchParams(window.location.search);
            const chosenDistrict = urlParams.get('district');

            // Настройки по умолчанию (Общий центр Перми)
            let mapCenter = [58.0104, 56.2504]; 
            let defaultZoom = 12;

            if (chosenDistrict && districtCoordinates[chosenDistrict]) {
                mapCenter = districtCoordinates[chosenDistrict];
                defaultZoom = 14; // Приближаем ближе к центру района
            }

            // 3. Создаем карту
            var myMap = new ymaps.Map("map", {
                center: mapCenter,
                zoom: defaultZoom,
                controls: ['zoomControl', 'geolocationControl']
            });

            // 4. Если пользователь выбрал район — ставим ЖИРНУЮ метку прямо в новый центр
            if (chosenDistrict && districtCoordinates[chosenDistrict]) {
                var centerMark = new ymaps.Placemark(mapCenter, {
                    balloonContent: `<b>Вы здесь: ${districtNames[chosenDistrict]}</b><br>Твой базовый район для поиска батлов.`
                }, {
                    preset: 'islands#goldStarIcon', // Иконка золотой звезды, чтобы сразу бросалась в глаза
                    iconColor: '#ffcc00'
                });
                myMap.geoObjects.add(centerMark);
            }

            // 5. Твои дополнительные игровые точки (для примера)
            var placemark1 = new ymaps.Placemark([58.0120, 56.2520], {
                balloonContent: '<b>Клуб "Ленинский Батл"</b><br>Статус: Идет сбор игроков!'
            }, { preset: 'islands#redDotIcon' });

            var placemark2 = new ymaps.Placemark([58.0310, 56.2900], {
                balloonContent: '<b>Мотовилиха Gaming</b><br>Турнир по фифе в субботу!'
            }, { preset: 'islands#blueDotIcon' });

            myMap.geoObjects.add(placemark1);
            myMap.geoObjects.add(placemark2);
        }
    </script>
</body>
</html>
